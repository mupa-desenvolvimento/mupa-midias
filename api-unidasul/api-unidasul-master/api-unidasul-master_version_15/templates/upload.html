{% extends "base.html" %}

{% block title %}Upload de Imagens e Vídeos{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Upload de Imagens e Vídeos</h2>
<form id="uploadForm" enctype="multipart/form-data" method="post" class="space-y-4">
    <input type="file" name="file" id="fileInput" accept="image/*,video/*" class="block w-full text-gray-200" required>
    <button type="submit" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700 text-white">Enviar</button>
</form>
<div id="uploadMsg" class="mt-4"></div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('uploadForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData();
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files.length) return;
    formData.append('file', fileInput.files[0]);
    const resp = await fetch('/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('access_token') || '') },
        body: formData
    });
    const msgDiv = document.getElementById('uploadMsg');
    if (resp.ok) {
        const data = await resp.json();
        msgDiv.innerHTML = `<span class='text-green-400'>${data.message}</span>`;
    } else {
        const err = await resp.json();
        msgDiv.innerHTML = `<span class='text-red-400'>${err.error || 'Erro ao enviar arquivo'}</span>`;
    }
});
</script>
{% endblock %}
