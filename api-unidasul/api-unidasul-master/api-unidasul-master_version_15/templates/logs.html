{% extends "base.html" %}

{% block title %}Logs do Sistema - Serviço TC Mupa{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Logs do Sistema</h2>

<div class="card-bg p-6 rounded-lg shadow-lg">
    <div class="flex justify-between items-center mb-4">
        <div class="flex space-x-4">
            <input type="text" id="searchLogs" placeholder="Buscar..." class="px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
            <button id="btnSearchLogs" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition duration-200">
                Buscar
            </button>
        </div>
    </div>
    
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-700">
            <thead>
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Data/Hora</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Tipo</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Mensagem</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Detalhes</th>
                </tr>
            </thead>
            <tbody id="logsTableBody" class="divide-y divide-gray-700">
                <!-- Os logs serão carregados via JavaScript -->
            </tbody>
        </table>
    </div>
    
    <div class="mt-4 flex justify-between items-center">
        <div class="text-sm text-gray-400" id="paginationInfo"></div>
        <div class="flex space-x-2">
            <button id="prevPage" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600 transition duration-200 disabled:opacity-50" disabled>
                Anterior
            </button>
            <button id="nextPage" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600 transition duration-200">
                Próximo
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
const perPage = 10;

function carregarLogs() {
    fetch(`/api/logs?page=${currentPage}&per_page=${perPage}`)
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('logsTableBody');
            tbody.innerHTML = '';
            
            data.logs.forEach(log => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">${log.data_hora}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 text-xs rounded-full ${log.tipo === 'error' ? 'bg-red-900/20 text-red-300' : 'bg-blue-900/20 text-blue-300'}">
                            ${log.tipo}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-300">${log.mensagem}</td>
                    <td class="px-6 py-4 text-sm text-gray-300">${log.detalhes || '-'}</td>
                `;
                tbody.appendChild(tr);
            });

            // Atualizar informações de paginação
            document.getElementById('paginationInfo').textContent = 
                `Mostrando ${(currentPage - 1) * perPage + 1} a ${Math.min(currentPage * perPage, data.logs.length)} de ${data.logs.length} registros`;
            
            // Atualizar botões de navegação
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage * perPage >= data.logs.length;
        })
        .catch(error => {
            console.error('Erro ao carregar logs:', error);
            alert('Erro ao carregar logs do sistema');
        });
}

// Event listeners para paginação
document.getElementById('prevPage').addEventListener('click', () => {
    if (currentPage > 1) {
        currentPage--;
        carregarLogs();
    }
});

document.getElementById('nextPage').addEventListener('click', () => {
    currentPage++;
    carregarLogs();
});

// Event listener para busca
document.getElementById('btnSearchLogs').addEventListener('click', () => {
    currentPage = 1;
    carregarLogs();
});

// Carregar logs inicialmente
carregarLogs();
</script>
{% endblock %}
