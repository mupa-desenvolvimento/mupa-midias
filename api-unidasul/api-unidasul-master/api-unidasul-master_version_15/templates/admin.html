<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Produtos - Unidasul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
        }
        .dark-bg {
            background-color: #1e293b;
        }
        .card-bg {
            background-color: #1e293b;
            border: 1px solid #334155;
        }
        .hover-card:hover {
            transform: translateY(-2px);
            transition: transform 0.2s;
        }
    </style>
</head>
<body class="text-gray-100">
    <div class="min-h-screen">
        <!-- Header -->
        <div class="dark-bg p-4 border-b border-gray-700">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold">Consulta de Produtos</h1>
                <div class="space-x-4">
                    <a href="/" class="text-blue-400 hover:text-blue-300">Início</a>
                    <a href="/dashboard" class="text-blue-400 hover:text-blue-300">Dashboard</a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container mx-auto p-8">
            <!-- Formulário de Consulta -->
            <div class="card-bg p-6 rounded-lg shadow-lg mb-8">
                <h2 class="text-xl font-semibold mb-4">Consulta por EAN</h2>
                <form id="consultaForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="ean" class="block text-sm font-medium mb-1">EAN do Produto</label>
                            <input type="text" id="ean" name="ean" required
                                class="w-full px-4 py-2 rounded bg-gray-800 border border-gray-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        </div>
                        <div>
                            <label for="filial" class="block text-sm font-medium mb-1">Número da Filial</label>
                            <input type="text" id="filial" name="filial" required
                                class="w-full px-4 py-2 rounded bg-gray-800 border border-gray-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        </div>
                    </div>
                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded">
                        Consultar
                    </button>
                </form>
            </div>

            <!-- Resultado da Consulta -->
            <div id="loading" class="hidden">
                <div class="flex items-center justify-center p-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
                </div>
            </div>

            <div id="resultado" class="card-bg p-6 rounded-lg shadow-lg hidden">
                <h2 class="text-xl font-semibold mb-4">Resultado da Consulta</h2>
                <div class="space-y-4">
                    <div id="imagem-container" class="flex justify-center">
                        <img id="imagem-produto" class="max-w-xs rounded-lg shadow-lg" alt="Imagem do Produto">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <h3 class="text-lg font-medium mb-2">Descrição</h3>
                            <p id="descricao" class="text-gray-300"></p>
                        </div>
                        <div>
                            <h3 class="text-lg font-medium mb-2">Preço</h3>
                            <p id="preco" class="text-2xl font-bold text-blue-400"></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <h3 class="text-lg font-medium mb-2">Preço Clube</h3>
                            <p id="preco-clube" class="text-2xl font-bold text-green-400"></p>
                        </div>
                        <div>
                            <h3 class="text-lg font-medium mb-2">Código do Produto</h3>
                            <p id="codigo" class="text-gray-300 whitespace-pre-line"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mensagens de Erro -->
            <div id="errorAlert" class="hidden bg-red-900 text-white p-4 rounded-lg mb-8">
                <p id="errorMessage"></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const consultaForm = document.getElementById('consultaForm');
            const loading = document.getElementById('loading');
            const resultado = document.getElementById('resultado');
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');

            consultaForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const ean = document.getElementById('ean').value;
                const filial = document.getElementById('filial').value;

                // Validação básica
                if (!ean || !filial) {
                    showError('Por favor, preencha todos os campos');
                    return;
                }

                // Mostra loading
                loading.classList.remove('hidden');
                resultado.classList.add('hidden');
                errorAlert.classList.add('hidden');

                try {
                    const response = await fetch(`/get_price_html/${ean}/${filial}`);
                    const data = await response.json();

                    if (data.error) {
                        showError(data.error);
                        return;
                    }

                    // Atualiza os campos com os dados
                    document.getElementById('descricao').textContent = data.elementos.lblDcrProduto || 'Não disponível';
                    document.getElementById('preco').textContent = data.elementos.lblPreco ? data.elementos.lblPreco : 'Não disponível';
                    document.getElementById('preco-clube').textContent = data.elementos.lblPrecoDC ? data.elementos.lblPrecoDC : 'Não disponível';
                    document.getElementById('codigo').textContent = data.elementos.lblScanner || 'Não disponível';

                    // Atualiza a imagem
                    const imagemProduto = document.getElementById('imagem-produto');
                    if (data.imagem_status === 'disponivel') {
                        imagemProduto.src = data.imagem_url;
                        imagemProduto.classList.remove('hidden');
                    } else {
                        imagemProduto.classList.add('hidden');
                    }

                    // Mostra o resultado
                    resultado.classList.remove('hidden');
                } catch (error) {
                    showError('Erro ao realizar a consulta: ' + error.message);
                } finally {
                    loading.classList.add('hidden');
                }
            });

            function showError(message) {
                errorMessage.textContent = message;
                errorAlert.classList.remove('hidden');
                resultado.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
