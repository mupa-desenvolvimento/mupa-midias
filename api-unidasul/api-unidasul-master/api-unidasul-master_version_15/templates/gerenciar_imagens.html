{% extends "base.html" %}
{% block title %}Gerenciar Imagens de Produtos{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-6">Gerenciar Imagens de Produtos</h2>
<div class="space-y-6">
  <!-- Buscar imagem -->
  <form id="searchForm" class="flex space-x-4 mb-4">
    <input type="text" name="ean" id="eanInput" placeholder="Digite o EAN do produto" class="form-input px-4 py-2 rounded w-64" required>
    <button type="submit" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700 text-white">Buscar</button>
  </form>
  <div id="imagemContainer" class="mb-4 hidden">
    <img id="imagemProduto" src="" alt="Imagem do Produto" class="max-w-xs rounded-lg shadow-lg mb-2">
    <div>
      <button id="deleteBtn" class="px-3 py-1 bg-red-600 rounded hover:bg-red-700 text-white">Deletar Imagem</button>
    </div>
  </div>
  <!-- Upload de imagem -->
  <form id="uploadForm" enctype="multipart/form-data" method="post" class="space-y-2">
    <input type="text" name="ean" id="eanUpload" placeholder="EAN do produto" class="form-input px-4 py-2 rounded w-64" required>
    <input type="file" name="file" id="fileInput" accept="image/*" class="block w-full text-gray-200" required>
    <button type="submit" class="px-4 py-2 bg-green-600 rounded hover:bg-green-700 text-white">Upload</button>
  </form>
  <div id="msg" class="mt-4"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
// Buscar imagem
const searchForm = document.getElementById('searchForm');
const imagemContainer = document.getElementById('imagemContainer');
const imagemProduto = document.getElementById('imagemProduto');
const deleteBtn = document.getElementById('deleteBtn');
const msgDiv = document.getElementById('msg');
searchForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const ean = document.getElementById('eanInput').value.trim();
  imagemProduto.src = '';
  imagemContainer.classList.add('hidden');
  msgDiv.innerHTML = '';
  if (!ean) return;
  const resp = await fetch(`/gerenciar_imagens/view/${ean}`);
  if (resp.ok) {
    imagemProduto.src = `/gerenciar_imagens/view/${ean}?t=${Date.now()}`;
    imagemContainer.classList.remove('hidden');
  } else {
    msgDiv.innerHTML = `<span class='text-red-400'>Imagem não encontrada.</span>`;
  }
});
// Upload de imagem
const uploadForm = document.getElementById('uploadForm');
uploadForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(uploadForm);
  msgDiv.innerHTML = '';
  try {
    const resp = await fetch('/gerenciar_imagens/upload', {
      method: 'POST',
      body: formData
    });
    const data = await resp.json();
    if (resp.ok) {
      msgDiv.innerHTML = `<span class='text-green-400'>${data.message}</span>`;
    } else {
      msgDiv.innerHTML = `<span class='text-red-400'>${data.error || 'Erro ao enviar imagem.'}</span>`;
    }
  } catch (error) {
    console.error('Erro ao processar requisição:', error);
    msgDiv.innerHTML = `<span class='text-red-400'>Erro de conexão ao tentar enviar a imagem.</span>`;
  }
});
// Deletar imagem
if(deleteBtn){
  deleteBtn.addEventListener('click', async () => {
    const ean = document.getElementById('eanInput').value.trim();
    if (!ean) return;
    if (!confirm('Tem certeza que deseja deletar a imagem?')) return;
    try {
      const resp = await fetch('/gerenciar_imagens/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ean })
      });
      const data = await resp.json();
      if (resp.ok) {
        imagemProduto.src = '';
        imagemContainer.classList.add('hidden');
        msgDiv.innerHTML = `<span class='text-green-400'>${data.message}</span>`;
      } else {
        msgDiv.innerHTML = `<span class='text-red-400'>${data.error || 'Erro ao deletar imagem.'}</span>`;
      }
    } catch (error) {
      console.error('Erro ao processar requisição:', error);
      msgDiv.innerHTML = `<span class='text-red-400'>Erro de conexão ao tentar deletar a imagem.</span>`;
    }
  });
}
</script>
{% endblock %}
