{% extends "base.html" %}

{% block title %}Consulta de Produtos - Serviço TC Mupa{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Consulta de Produtos</h2>

<div class="card-bg p-6 rounded-lg shadow-lg">
    <form id="consultaForm" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Código de Barras (EAN)</label>
                <input type="text" id="ean" name="ean" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Número da Filial</label>
                <input type="text" id="filial" name="filial" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500" required>
            </div>
        </div>
        <div class="flex justify-end">
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition duration-200 flex items-center">
                <span id="btnText">Consultar Produto</span>
                <div id="loadingSpinner" class="hidden ml-2">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </div>
            </button>
        </div>
    </form>
</div>

<!-- Resultado da Consulta -->
<div id="resultado" class="hidden mt-6">
    <div class="card-bg p-6 rounded-lg shadow-lg">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Imagem do Produto -->
            <div class="flex flex-col items-center">
                <img id="produtoImagem" class="hidden max-w-full h-auto rounded-lg" alt="Imagem do Produto">
                <div id="semImagem" class="text-gray-400 text-center">
                    <svg class="w-24 h-24 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <p>Imagem não disponível</p>
                </div>
            </div>
            
            <!-- Informações do Produto -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400">Descrição do Produto</label>
                    <p id="produtoDescricao" class="mt-1 text-lg text-white"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400">Código do Produto</label>
                    <p id="produtoCodigo" class="mt-1 text-lg text-white"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400">Preço Normal</label>
                    <p id="precoNormal" class="mt-1 text-lg text-white"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400">Preço Clube</label>
                    <p id="precoClube" class="mt-1 text-lg text-white"></p>
                </div>
            </div>
        </div>
        
        <!-- Elementos Adicionais -->
        <div id="elementosAdicionais" class="mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Os elementos adicionais serão inseridos aqui via JavaScript -->
        </div>
    </div>
</div>

<!-- Mensagem de Erro -->
<div id="errorAlert" class="hidden mt-6">
    <div class="bg-red-900/20 border border-red-700 text-red-300 px-4 py-3 rounded relative" role="alert">
        <span id="errorMessage" class="block sm:inline"></span>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('consultaForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btnText = document.getElementById('btnText');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const resultado = document.getElementById('resultado');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const elementosAdicionais = document.getElementById('elementosAdicionais');
    
    // Obter valores do formulário
    const ean = document.getElementById('ean').value;
    const filial = document.getElementById('filial').value;
    
    // Validação básica
    if (!ean || !filial) {
        showError('Por favor, preencha todos os campos');
        return;
    }
    
    try {
        // Desabilitar botão e mostrar loading
        btnText.textContent = 'Consultando...';
        loadingSpinner.classList.remove('hidden');
        resultado.classList.add('hidden');
        errorAlert.classList.add('hidden');
        
        // Fazer requisição para API
        const response = await fetch(`/get_price_html/${ean}/${filial}`);
        const data = await response.json();
        
        if (data.error) {
            showError(data.error);
            return;
        }
        
        // Atualiza os elementos principais
        document.getElementById('produtoDescricao').textContent = data.elementos.lblDcrProduto || 'Não disponível';
        document.getElementById('produtoCodigo').textContent = data.elementos.lblCodProduto || 'Não disponível';
        document.getElementById('precoNormal').textContent = data.elementos.lblPreco ? data.elementos.lblPreco : 'Não disponível';
        document.getElementById('precoClube').textContent = data.elementos.lblPrecoDC ? data.elementos.lblPrecoDC : 'Não disponível';
        
        // Gerencia a imagem do produto
        const produtoImagem = document.getElementById('produtoImagem');
        const semImagem = document.getElementById('semImagem');
        
        if (data.imagem_status === 'disponivel') {
            produtoImagem.src = data.imagem_url;
            produtoImagem.classList.remove('hidden');
            semImagem.classList.add('hidden');
        } else {
            produtoImagem.classList.add('hidden');
            semImagem.classList.remove('hidden');
        }
        
        // Limpa elementos adicionais anteriores
        elementosAdicionais.innerHTML = '';
        
        // Adiciona todos os elementos adicionais
        for (const [id, valor] of Object.entries(data.elementos)) {
            // Pula os elementos já exibidos
            if (['lblDcrProduto', 'lblPreco', 'lblPrecoDC'].includes(id)) continue;
            
            const div = document.createElement('div');
            div.className = 'space-y-2';
            div.innerHTML = `
                <label class="block text-sm font-medium text-gray-400">${id}</label>
                <p class="text-white whitespace-pre-line">${valor || 'Não disponível'}</p>
            `;
            elementosAdicionais.appendChild(div);
        }
        
        // Adiciona o EAN na resposta
        const eanDiv = document.createElement('div');
        eanDiv.className = 'mt-4';
        eanDiv.innerHTML = `
            <label class="block text-sm font-medium text-gray-400">EAN</label>
            <p class="mt-1 text-lg text-white">${data.ean}</p>
        `;
        document.querySelector('.space-y-4').appendChild(eanDiv);
        
        // Mostra o resultado
        resultado.classList.remove('hidden');
        
    } catch (error) {
        console.error('Erro ao consultar produto:', error);
        showError('Erro ao consultar produto: ' + error.message);
    } finally {
        // Restaurar estado do botão
        btnText.textContent = 'Consultar Produto';
        loadingSpinner.classList.add('hidden');
    }
});

function showError(message) {
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    errorMessage.textContent = message;
    errorAlert.classList.remove('hidden');
}
</script>
{% endblock %}
