{% extends "base.html" %}

{% block title %}Exportar Relatórios - Serviço TC Mupa{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Exportar Relatórios</h2>

<div class="card-bg p-6 rounded-lg shadow-lg">
    <div class="mb-6">
        <h3 class="text-lg font-semibold mb-4">Configurações do Relatório</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Tipo de Consulta</label>
                <select id="tipoFiltro" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
                    <option value="todos">Todos os Tipos</option>
                    <option value="preco">Preço Normal</option>
                    <option value="preco_clube">Preço Clube</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Período</label>
                <select id="periodoFiltro" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
                    <option value="hoje">Hoje</option>
                    <option value="semana">Última Semana</option>
                    <option value="mes">Último Mês</option>
                    <option value="personalizado">Período Personalizado</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Filial</label>
                <input type="text" id="filialFiltro" placeholder="Todas as Filiais" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
            </div>
        </div>
        
        <div id="periodoPersonalizado" class="hidden mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Data Inicial</label>
                <input type="date" id="dataInicial" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Data Final</label>
                <input type="date" id="dataFinal" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
            </div>
        </div>
    </div>
    
    <div class="mb-6">
        <h3 class="text-lg font-semibold mb-4">Formato de Exportação</h3>
        <div class="flex space-x-4">
            <label class="inline-flex items-center">
                <input type="radio" name="formato" value="csv" checked class="form-radio text-blue-500">
                <span class="ml-2">CSV</span>
            </label>
            <label class="inline-flex items-center">
                <input type="radio" name="formato" value="json" class="form-radio text-blue-500">
                <span class="ml-2">JSON</span>
            </label>
        </div>
    </div>
    
    <div class="flex justify-end">
        <button id="btnExportar" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition duration-200 flex items-center">
            <span id="btnText">Exportar Relatório</span>
            <div id="loadingSpinner" class="hidden ml-2">
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('periodoFiltro').addEventListener('change', function() {
    const periodoPersonalizado = document.getElementById('periodoPersonalizado');
    periodoPersonalizado.classList.toggle('hidden', this.value !== 'personalizado');
});

document.getElementById('btnExportar').addEventListener('click', async function() {
    const btnText = document.getElementById('btnText');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const button = this;
    
    // Obter valores dos filtros
    const tipo = document.getElementById('tipoFiltro').value;
    const periodo = document.getElementById('periodoFiltro').value;
    const filial = document.getElementById('filialFiltro').value;
    const formato = document.querySelector('input[name="formato"]:checked').value;
    
    // Dados adicionais para período personalizado
    const dataInicial = document.getElementById('dataInicial').value;
    const dataFinal = document.getElementById('dataFinal').value;
    
    // Validar datas se período personalizado
    if (periodo === 'personalizado') {
        if (!dataInicial || !dataFinal) {
            alert('Por favor, preencha as datas inicial e final para o período personalizado.');
            return;
        }
    }
    
    try {
        // Desabilitar botão e mostrar loading
        button.disabled = true;
        btnText.textContent = 'Exportando...';
        loadingSpinner.classList.remove('hidden');
        
        // Preparar dados para envio
        const formData = new FormData();
        formData.append('tipo', tipo);
        formData.append('periodo', periodo);
        formData.append('filial', filial);
        formData.append('formato', formato);
        
        if (periodo === 'personalizado') {
            formData.append('data_inicial', dataInicial);
            formData.append('data_final', dataFinal);
        }
        
        // Fazer requisição para API
        const response = await fetch('/api/exportar-relatorio', {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) {
            throw new Error('Erro ao exportar relatório');
        }
        
        // Obter o nome do arquivo do header da resposta
        const filename = response.headers.get('content-disposition')
            ?.split('filename=')[1]
            ?.replace(/["']/g, '') || `relatorio.${formato}`;
        
        // Criar blob e fazer download
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        
    } catch (error) {
        console.error('Erro ao exportar relatório:', error);
        alert('Erro ao exportar relatório: ' + error.message);
    } finally {
        // Restaurar estado do botão
        button.disabled = false;
        btnText.textContent = 'Exportar Relatório';
        loadingSpinner.classList.add('hidden');
    }
});
</script>
{% endblock %}
