{% extends "base.html" %}

{% block title %}Últimas Consultas - Serviço TC Mupa{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Últimas Consultas</h2>

<div class="card-bg p-6 rounded-lg shadow-lg">
    <div class="flex justify-between items-center mb-4">
        <div class="flex space-x-4">
            <select id="tipoFiltro" class="px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
                <option value="todos">Todos os Tipos</option>
                <option value="preco">Preço Normal</option>
                <option value="preco_clube">Preço Clube</option>
            </select>
            <select id="periodoFiltro" class="px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
                <option value="hoje">Hoje</option>
                <option value="semana">Última Semana</option>
                <option value="mes">Último Mês</option>
            </select>
            <input type="text" id="filialFiltro" placeholder="Número da Filial" class="px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
            <button id="btnFiltrar" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition duration-200">
                Filtrar
            </button>
        </div>
    </div>
    
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-700">
            <thead>
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Data/Hora</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">EAN</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Descrição</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Filial</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Tipo</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Preço</th>
                </tr>
            </thead>
            <tbody id="consultasTableBody" class="divide-y divide-gray-700">
                <!-- As consultas serão carregadas via JavaScript -->
            </tbody>
        </table>
    </div>
    
    <div class="mt-4 flex justify-between items-center">
        <div class="text-sm text-gray-400" id="paginationInfo"></div>
        <div class="flex space-x-2">
            <button id="prevPage" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600 transition duration-200 disabled:opacity-50" disabled>
                Anterior
            </button>
            <button id="nextPage" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600 transition duration-200">
                Próximo
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
const perPage = 10;

function formatarData(dataString) {
    const data = new Date(dataString);
    return data.toLocaleString('pt-BR');
}

function formatarPreco(preco) {
    if (preco === null || preco === undefined) return 'N/A';
    return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL'
    }).format(preco);
}

function carregarConsultas() {
    const tipo = document.getElementById('tipoFiltro').value;
    const periodo = document.getElementById('periodoFiltro').value;
    const filial = document.getElementById('filialFiltro').value;
    
    fetch(`/api/ultimas-consultas?tipo=${tipo}&periodo=${periodo}&filial=${filial}&page=${currentPage}&per_page=${perPage}`)
        .then(response => response.json())
        .then(data => {
            if (data.status === 'error') {
                throw new Error(data.message);
            }
            
            const tbody = document.getElementById('consultasTableBody');
            tbody.innerHTML = '';
            
            data.consultas.forEach(consulta => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">${formatarData(consulta.data_hora)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">${consulta.ean}</td>
                    <td class="px-6 py-4 text-sm text-gray-300">${consulta.descricao || 'N/A'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">${consulta.filial}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 text-xs rounded-full ${consulta.tipo === 'Preço Clube' ? 'bg-green-900/20 text-green-300' : 'bg-blue-900/20 text-blue-300'}">
                            ${consulta.tipo}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">
                        ${consulta.tipo === 'Preço Clube' ? formatarPreco(consulta.preco_clube) : formatarPreco(consulta.preco)}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Atualizar informações de paginação
            const inicio = (currentPage - 1) * perPage + 1;
            const fim = Math.min(currentPage * perPage, data.pagination.total);
            document.getElementById('paginationInfo').textContent = 
                `Mostrando ${inicio} a ${fim} de ${data.pagination.total} registros`;
            
            // Atualizar botões de navegação
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === data.pagination.total_pages;
        })
        .catch(error => {
            console.error('Erro ao carregar consultas:', error);
            alert('Erro ao carregar consultas: ' + error.message);
        });
}

// Event listeners para paginação
document.getElementById('prevPage').addEventListener('click', () => {
    if (currentPage > 1) {
        currentPage--;
        carregarConsultas();
    }
});

document.getElementById('nextPage').addEventListener('click', () => {
    currentPage++;
    carregarConsultas();
});

// Event listener para filtros
document.getElementById('btnFiltrar').addEventListener('click', () => {
    currentPage = 1;
    carregarConsultas();
});

// Carregar consultas inicialmente
carregarConsultas();
</script>
{% endblock %}
